name: BMPro RV Controller Bridge
version: "0.2.1"
slug: bmpro
description: >-
  Pairs with a BMPro RVMN101C control node over BLE and exposes lights,
  climate zones, slides/awnings, and system status to Home Assistant via
  MQTT discovery.
url: https://github.com/AshleyGrant/hassio-addons/tree/main/bmpro
image: ghcr.io/ashleygrant/bmpro-research/bmpro-{arch}
arch:
  - aarch64
  - amd64
init: false
host_dbus: true
services:
  - mqtt:need
options:
  device_address: ""
  device_identifier: 1
  mqtt_discovery_prefix: homeassistant
  mqtt_base_topic: bmpro
  log_level: info
schema:
  device_address: "match(^$|^([0-9A-Fa-f]{2}:){5}[0-9A-Fa-f]{2}$)?"
  device_identifier: int(0,255)
  mqtt_discovery_prefix: str
  mqtt_base_topic: str
  log_level: list(trace|debug|info|warn|error)
  mqtt_host: str?
  mqtt_port: int(1,65535)?
  mqtt_username: str?
  mqtt_password: password?
startup: services
boot: auto
hassio_api: true
